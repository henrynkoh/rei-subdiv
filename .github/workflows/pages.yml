# GitHub Pages: Settings → Pages → Source = GitHub Actions
# Adjust BASE_PATH to match your repo name (e.g. /rei-subdiv for user.github.io/rei-subdiv)

name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build static export
        env:
          # TODO: set to /your-repo-name for project pages; leave empty for custom domain root
          BASE_PATH: /rei-subdiv
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
